<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polex Estate</title>
    <link rel="icon" type="image/png" href="./assets/polex-estate-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        .card-shadow { box-shadow: 0 18px 50px rgba(28, 25, 23, .08); }
        .dark .card-shadow { box-shadow: 0 18px 50px rgba(0, 0, 0, .4); }

        .reveal {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity .55s ease, transform .55s ease, background-color .3s ease, border-color .3s ease;
        }
        .reveal.is-visible { opacity: 1; transform: translateY(0); }

        .media-thumb img { transition: transform .45s ease; }
        .media-thumb:hover img { transform: scale(1.04); }
        .card-desc {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .34s ease, opacity .22s ease, margin-top .22s ease;
            margin-top: 0;
        }
        .card-desc.is-open { opacity: 1; margin-top: 1rem; }
        .lightbox { opacity: 0; pointer-events: none; transition: opacity .18s ease; }
        .lightbox.is-open { opacity: 1; pointer-events: auto; }
        .lang-btn.is-active,
        .tab-btn.is-active {
            background: #1c1917 !important;
            color: #fff !important;
            box-shadow: 0 2px 10px rgba(28,25,23,.12) !important;
        }
        .dark .lang-btn.is-active,
        .dark .tab-btn.is-active {
            background: #f5f5f4 !important;
            color: #1c1917 !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.3) !important;
        }


        /* Контейнер для зума */
        #zoomWrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #zoomContent {
            transition: transform 0.1s ease-out;
            cursor: grab;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            flex: 0 0 auto;
            will-change: transform;
        }

        #zoomContent:active { cursor: grabbing; }

        #zoomContent img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }

        /* Стили для корректного отображения Plyr в лайтбоксе */
        #lightboxStage .plyr {
            width: fit-content !important;
            max-width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            --plyr-color-main: #10b981;
            margin: 0 auto;
        }

        #lightboxStage .plyr__video-wrapper {
            width: fit-content !important;
            max-width: 100%;
        }

        #lightboxStage .plyr video {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 100% !important; /* Для мобильных ограничиваем строго 100% контейнера */
            object-fit: contain !important;
        }

        /* Возвращаем оригинальный размер 75vh для десктопов */
        @media (min-width: 640px) {
            #lightboxStage .plyr video {
                max-height: 75vh !important;
            }
        }

        #lightboxStage .plyr.plyr--fullscreen,
        #lightboxStage .plyr:fullscreen,
        :fullscreen {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
        }

        #lightboxStage .plyr.plyr--fullscreen .plyr__video-wrapper,
        #lightboxStage .plyr:fullscreen .plyr__video-wrapper,
        :fullscreen .plyr__video-wrapper {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
        }

        #lightboxStage .plyr.plyr--fullscreen video,
        #lightboxStage .plyr:fullscreen video,
        video:fullscreen,
        #lightboxStage .plyr.plyr--fullscreen .plyr__video-wrapper video,
        :fullscreen .plyr__video-wrapper video {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            object-fit: contain !important;
            border-radius: 0 !important;
        }
    </style>
</head>

                    <button type="button" class="lang-btn rounded-xl px-3 py-2 text-center text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="it">IT</button>

<script>
    (function loadApartmentFiles() {
        const files = Array.isArray(window.APARTMENT_FILES) ? window.APARTMENT_FILES : [];
        files.forEach((src) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = false;
            document.body.appendChild(script);
        });

</script>
<script>
    window.addEventListener('load', function () {
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIconSun = document.getElementById('themeIconSun');
        const themeIconMoon = document.getElementById('themeIconMoon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeIconSun.classList.remove('hidden');
                themeIconMoon.classList.add('hidden');
            } else {
                themeIconSun.classList.add('hidden');
                themeIconMoon.classList.remove('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            updateThemeIcons();
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
        updateThemeIcons();

        const apartments = Array.isArray(window.__APARTMENTS) ? window.__APARTMENTS.filter(Boolean) : [];
        const grid = document.getElementById('apartmentsGrid');
        const emptyState = document.getElementById('emptyState');
        const resultsCountContainer = document.getElementById('resultsCountContainer');
        const resultsCount = document.getElementById('resultsCount');
        const langButtons = Array.from(document.querySelectorAll('.lang-btn'));
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
        const brandSubtitle = document.getElementById('brandSubtitle');

        // Элементы мобильного выпадающего списка
        const mobileLangToggle = document.getElementById('mobileLangToggle');
        const mobileLangDropdown = document.getElementById('mobileLangDropdown');
        const mobileLangCurrent = document.getElementById('mobileLangCurrent');
        const langLabels = { ru: 'RU', uk: 'UA', it: 'IT' };

        if (mobileLangToggle && mobileLangDropdown) {
            mobileLangToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileLangDropdown.classList.toggle('hidden');
                mobileLangDropdown.classList.toggle('flex');
            });

            document.addEventListener('click', (e) => {
                if (!mobileLangToggle.contains(e.target) && !mobileLangDropdown.contains(e.target)) {
                    mobileLangDropdown.classList.add('hidden');
                    mobileLangDropdown.classList.remove('flex');
                }
            });
        }

        const materialsIcon = '<svg viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;width:1em;height:1em;vertical-align:-0.125em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="18" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5.5-5.5a1 1 0 0 0-1.4 0L8 16"/><path d="M13 16l-2.5-2.5a1 1 0 0 0-1.4 0L6.5 16"/></svg>';

        const ui = {
            ru: {
                subtitle: 'Аренда квартир в Турине',
                rentTab: 'Аренда',
                futureTab: 'Будущая аренда',
                details: 'Подробнее',
                hide: 'Скрыть',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Скоро здесь появятся новые варианты.',
                galleryItem: 'Материал',
                shown: 'Доступно вариантов: {n}'
            },
            uk: {
                subtitle: 'Оренда квартир у Турині',
                rentTab: 'Оренда',
                futureTab: 'Майбутня оренда',
                details: 'Детальніше',
                hide: 'Сховати',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Незабаром тут зʼявляться нові варіанти.',
                galleryItem: 'Матеріал',
                shown: 'Доступно варіантів: {n}'
            },
            it: {
                subtitle: 'Affitti a Torino',
                rentTab: 'Affitto',
                futureTab: 'Prossime disponibilità',
                details: 'Dettagli',
                hide: 'Chiudi',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Presto qui compariranno nuove soluzioni.',
                galleryItem: 'Contenuto',
                shown: 'Soluzioni disponibili: {n}'
            }
        };

        function getPreferredLang() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && ui[urlLang]) return urlLang;
            const saved = localStorage.getItem('polexLang');
            if (saved && ui[saved]) return saved;
            const browserLang = (navigator.language || 'ru').slice(0, 2).toLowerCase();
            if (ui[browserLang]) return browserLang;
            return 'ru';
        }

        let currentLang = getPreferredLang();
        let activeTab = 'rent';
        let openCardId = null;

        const lightbox = document.getElementById('lightbox');
        const lightboxBackdrop = document.getElementById('lightboxBackdrop');
        const stage = document.getElementById('lightboxStage');
        const caption = document.getElementById('lightboxCaption');
        const counter = document.getElementById('lightboxCounter');
        const thumbs = document.getElementById('lightboxThumbs');
        const closeBtn = document.getElementById('lightboxClose');
        const prevBtn = document.getElementById('lightboxPrev');
        const nextBtn = document.getElementById('lightboxNext');
        let lightboxItems = [];
        let lightboxIndex = 0;
        let touchStartX = 0;
        let touchDeltaX = 0;

        let activePlyr = null;

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let lastTap = 0;
        let pinchStartDistance = 0;
        let pinchStartScale = 1;
        let pinchLastCenter = null;
        let zoomCleanup = null;

        function getDistance(touchA, touchB) {
            return Math.hypot(touchB.clientX - touchA.clientX, touchB.clientY - touchA.clientY);
        }

        function getTouchCenter(touchA, touchB) {
            return {
                x: (touchA.clientX + touchB.clientX) / 2,
                y: (touchA.clientY + touchB.clientY) / 2
            };
        }

        function fitZoomContent(wrapper, content) {
            if (!wrapper || !content) return;
            const img = content.querySelector('img');
            if (!img) return;

            const wrapperWidth = wrapper.clientWidth || wrapper.getBoundingClientRect().width;
            const wrapperHeight = wrapper.clientHeight || wrapper.getBoundingClientRect().height;
            const naturalWidth = img.naturalWidth || wrapperWidth || 1;
            const naturalHeight = img.naturalHeight || wrapperHeight || 1;
            const ratio = Math.min(wrapperWidth / naturalWidth, wrapperHeight / naturalHeight, 1);
            const fittedWidth = Math.max(1, naturalWidth * ratio);
            const fittedHeight = Math.max(1, naturalHeight * ratio);

            content.style.width = `${fittedWidth}px`;
            content.style.height = `${fittedHeight}px`;
        }

        function clampTranslate(wrapper, content) {
            if (!wrapper || !content || scale <= 1) {
                translateX = 0;
                translateY = 0;
                return;
            }

            const wrapperWidth = wrapper.clientWidth || wrapper.getBoundingClientRect().width;
            const wrapperHeight = wrapper.clientHeight || wrapper.getBoundingClientRect().height;
            const baseWidth = content.offsetWidth || content.getBoundingClientRect().width / Math.max(scale, 1);
            const baseHeight = content.offsetHeight || content.getBoundingClientRect().height / Math.max(scale, 1);
            const scaledWidth = baseWidth * scale;
            const scaledHeight = baseHeight * scale;
            const maxX = Math.max(0, (scaledWidth - wrapperWidth) / 2);
            const maxY = Math.max(0, (scaledHeight - wrapperHeight) / 2);

            translateX = Math.min(maxX, Math.max(-maxX, translateX));
            translateY = Math.min(maxY, Math.max(-maxY, translateY));
        }

        function zoomToPoint(nextScale, clientX, clientY, wrapper, content) {
            const targetScale = Math.min(Math.max(1, nextScale), 5);
            if (!wrapper || !content) {
                scale = targetScale;
                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                }
                updateTransform(wrapper, content);
                return;
            }

            const previousScale = scale || 1;
            const rect = wrapper.getBoundingClientRect();
            const pointX = clientX - (rect.left + rect.width / 2);
            const pointY = clientY - (rect.top + rect.height / 2);
            const ratio = targetScale / previousScale;

            translateX = (1 - ratio) * pointX + ratio * translateX;
            translateY = (1 - ratio) * pointY + ratio * translateY;
            scale = targetScale;

            if (scale === 1) {
                translateX = 0;
                translateY = 0;
            }

            updateTransform(wrapper, content);
        }

        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function updateTransform(wrapper = null, content = null) {
            const target = content || document.getElementById('zoomContent');
            const targetWrapper = wrapper || target?.parentElement;
            if (target) {
                clampTranslate(targetWrapper, target);
                target.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });

        function t(key) {
            return ui[currentLang][key] || ui.ru[key] || '';
        }

        function getLocalizedValue(apartment, key) {
            const i18n = apartment.i18n || {};
            const direct = apartment[key];
            const val = i18n[currentLang]?.[key] ?? i18n.ru?.[key] ?? direct;
            return typeof val === 'string' ? val.trim() : (val || '');
        }

        function localized(apartment) {
            return {
                title: getLocalizedValue(apartment, 'title'),
                price: getLocalizedValue(apartment, 'price'),
                address: getLocalizedValue(apartment, 'address'),
                description: getLocalizedValue(apartment, 'description'),
                mapsUrl: getLocalizedValue(apartment, 'mapsUrl') || apartment.mapsUrl || ''
            };
        }

        function listingType(apartment) {
            return apartment.listingType === 'future' ? 'future' : 'rent';
        }

        function mediaItems(apartment) {
            const gallery = Array.isArray(apartment.gallery) ? apartment.gallery : [];
            return gallery.filter((item) => item && item.src);
        }

        function updateLangUI() {
            document.documentElement.lang = currentLang;
            document.title = 'Polex Estate';
            brandSubtitle.textContent = t('subtitle');
            emptyState.textContent = t('empty');
            tabButtons.forEach((btn) => {
                btn.textContent = btn.dataset.tab === 'rent' ? t('rentTab') : t('futureTab');
            });
            langButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.lang === currentLang));

            // Обновление состояния мобильного селектора
            if (mobileLangCurrent) {
                mobileLangCurrent.textContent = langLabels[currentLang] || currentLang.toUpperCase();
            }
            if (mobileLangDropdown) {
                mobileLangDropdown.classList.add('hidden');
                mobileLangDropdown.classList.remove('flex');
            }
        }

        function createCard(apartment, index) {
            const data = localized(apartment);
            const article = document.createElement('article');
            const cardId = apartment.id || `apartment-${index}`;

            article.className = 'reveal self-start overflow-hidden rounded-[2rem] border border-stone-200/80 bg-white dark:border-stone-800 dark:bg-stone-900 card-shadow';

            const media = mediaItems(apartment);
            const materialsLabel = `${media.length || 1} ${t('materials')}`;
            const hasPrice = Boolean(data.price);
            const hasTitle = Boolean(data.title);
            const mapsHref = data.mapsUrl || '#';
            const safeCover = apartment.cover || media[0]?.src || 'https://placehold.co/1200x900/e7e5e4/78716c?text=Polex+Estate';

            article.innerHTML = `
          <button type="button" class="media-open media-thumb relative block aspect-[4/3] w-full overflow-hidden bg-stone-100 dark:bg-stone-800 text-left">
            <img src="${safeCover}" alt="${hasTitle ? data.title : 'Polex Estate'}" class="h-full w-full object-cover" />
            <span class="absolute bottom-3 right-3 rounded-full bg-black/70 px-3 py-1.5 text-xs font-medium text-white">${materialsLabel}</span>
          </button>
          <div class="flex flex-col p-4 sm:p-5">
            <div class="flex min-h-[145px] flex-col">
              <div class="min-h-[48px]">
                ${hasPrice ? `<div class="inline-flex rounded-full border border-amber-300 bg-amber-50 px-4 py-2 text-base font-semibold text-amber-800 dark:border-amber-500/30 dark:bg-amber-900/20 dark:text-amber-300">${data.price}</div>` : ''}
              </div>
              <div class="flex min-h-[64px] items-center">
                ${hasTitle ? `<h3 class="line-clamp-2 text-2xl font-semibold leading-tight tracking-tight text-stone-900 dark:text-white">${data.title}</h3>` : ''}
              </div>
              <div class="flex min-h-[33px] items-start mt-2">
                ${data.address ? `<a href="${mapsHref}" target="_blank" rel="noreferrer" class="inline-flex items-start gap-2 text-base leading-7 text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-200"><span class="pt-1 text-pink-500">📍</span><span>${data.address}</span></a>` : ''}
              </div>
            </div>
            <div class="mt-5 flex gap-3">
              <button type="button" data-card-id="${cardId}" class="desc-toggle inline-flex flex-1 items-center justify-center rounded-full border border-stone-300 px-4 py-3 text-sm font-medium text-stone-800 transition hover:border-stone-400 hover:bg-stone-50 dark:border-stone-700 dark:text-stone-200 dark:hover:border-stone-600 dark:hover:bg-stone-800">${t('details')}</button>
              <a href="${apartment.whatsappUrl || '#'}" target="_blank" rel="noreferrer" class="inline-flex flex-1 items-center justify-center rounded-full bg-emerald-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-500">${t('whatsapp')}</a>
            </div>
            <div class="card-desc" data-desc-id="${cardId}">
              <div class="rounded-3xl bg-stone-50 p-5 text-sm leading-8 text-stone-700 whitespace-pre-line dark:bg-stone-800/50 dark:text-stone-300">${data.description}</div>
            </div>
          </div>`;

            article.querySelector('.media-open').addEventListener('click', () => openLightbox(media.length ? media : [{ type: 'image', src: safeCover, alt: hasTitle ? data.title : 'Polex Estate' }], 0));
            article.querySelector('.desc-toggle').addEventListener('click', (event) => {
                event.stopPropagation();
                toggleDescription(cardId, article);
            });
            observer.observe(article);
            return article;
        }

        function syncDescButtons() {
            document.querySelectorAll('.desc-toggle').forEach((btn) => {
                btn.textContent = btn.dataset.cardId === openCardId ? t('hide') : t('details');
            });
        }

        function closeDescriptions() {
            document.querySelectorAll('.card-desc').forEach((block) => {
                block.classList.remove('is-open');
                block.style.maxHeight = '0px';
            });
            openCardId = null;
            syncDescButtons();
        }

        function openDescription(cardId) {
            document.querySelectorAll('.card-desc').forEach((block) => {
                const same = block.dataset.descId === cardId;
                block.classList.toggle('is-open', same);
                block.style.maxHeight = same ? block.scrollHeight + 'px' : '0px';
            });
            openCardId = cardId;
            syncDescButtons();
        }
        function toggleDescription(cardId, article) {
            if (openCardId === cardId) {
                closeDescriptions();
                return;
            }

            openDescription(cardId);

            if (article) {
                const scrollToCardBottom = () => {
                    const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                    const bottomGap = window.innerWidth < 768 ? 10 : 18;
                    const articleRect = article.getBoundingClientRect();
                    const visibleBottom = viewportHeight - bottomGap;

                    if (articleRect.bottom <= visibleBottom) return;

                    const targetTop = window.scrollY + articleRect.bottom - viewportHeight + bottomGap;

                    window.scrollTo({
                        top: Math.max(0, targetTop),
                        behavior: 'smooth'
                    });
                };

                const desc = article.querySelector(`.card-desc[data-desc-id="${cardId}"]`);
                if (desc) {
                    let didScroll = false;
                    const runScroll = () => {
                        if (didScroll) return;
                        didScroll = true;
                        scrollToCardBottom();
                    };

                    const onTransitionEnd = (event) => {
                        if (event.propertyName !== 'max-height') return;
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    };

                    desc.addEventListener('transitionend', onTransitionEnd);
                    setTimeout(() => {
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    }, 420);
                }
            }
        }

        function renderGrid() {
            const visible = apartments.filter((item) => listingType(item) === activeTab);
            grid.innerHTML = '';
            closeDescriptions();

            if (visible.length > 0) {
                emptyState.classList.add('hidden');

                // Обновление и показ счетчика в виде бейджа
                resultsCount.textContent = t('shown').replace('{n}', visible.length);
                resultsCountContainer.classList.remove('hidden');

                visible.forEach((apartment, index) => grid.appendChild(createCard(apartment, index)));
            } else {
                emptyState.classList.remove('hidden');

                // Скрытие счетчика, если элементов нет
                resultsCountContainer.classList.add('hidden');
            }
        }

        function setLang(lang) {
            currentLang = ui[lang] ? lang : 'ru';
            localStorage.setItem('polexLang', currentLang);
            const url = new URL(window.location.href);
            url.searchParams.set('lang', currentLang);
            window.history.replaceState({}, '', url.toString());
            updateLangUI();
            renderGrid();
        }

        function setTab(tab) {
            activeTab = tab === 'future' ? 'future' : 'rent';
            tabButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.tab === activeTab));
            renderGrid();
        }

        function renderLightbox() {
            if (activePlyr) {
                activePlyr.destroy();
                activePlyr = null;
            }

            const item = lightboxItems[lightboxIndex];
            if (!item) return;

            stage.innerHTML = '';

            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.src;
                video.poster = item.poster || '';
                video.controls = true;
                video.playsInline = true;
                video.autoplay = true;
                stage.appendChild(video);

                const isMobile = window.innerWidth < 768 || window.matchMedia("(pointer: coarse)").matches;

                activePlyr = new Plyr(video, {
                    autoplay: true,
                    clickToPlay: true,
                    controls: [
                        'play-large',
                        'play',
                        'progress',
                        'current-time',
                        'mute',
                        ...(isMobile ? [] : ['volume']),
                        'fullscreen'
                    ]
                });

                let lastTapTime = 0;
                activePlyr.on('ready', () => {
                    const wrapper = activePlyr.elements.wrapper;
                    if (wrapper) {
                        wrapper.addEventListener('touchend', (e) => {
                            if (!e.target.closest('.plyr__controls') && !e.target.closest('.plyr__control')) {
                                if (Math.abs(touchDeltaX) < 10) {
                                    const currentTime = new Date().getTime();
                                    const tapLength = currentTime - lastTapTime;

                                    if (tapLength < 300 && tapLength > 0) {
                                        e.preventDefault();
                                        activePlyr.togglePlay();
                                    }

                                    lastTapTime = currentTime;
                                }
                            }
                        }, { passive: false });
                    }
                });
            } else {
                const wrapper = document.createElement('div');
                wrapper.id = 'zoomWrapper';
                wrapper.className = 'h-full w-[calc(100%+6rem)] -mx-12 px-0 py-1 sm:mx-0 sm:w-full sm:px-6 sm:py-2';

                const content = document.createElement('div');
                content.id = 'zoomContent';

                const img = document.createElement('img');
                img.src = item.src;
                img.alt = item.alt || '';

                content.appendChild(img);
                wrapper.appendChild(content);
                stage.appendChild(wrapper);

                setupZoomEvents(wrapper, content);
            }

            caption.textContent = item.alt || '';
            counter.textContent = `${lightboxIndex + 1} / ${lightboxItems.length}`;
            thumbs.innerHTML = '';

            lightboxItems.forEach((thumb, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'shrink-0 overflow-hidden rounded-2xl border transition ' + (index === lightboxIndex ? 'border-white/70' : 'border-white/10 opacity-70');
                button.innerHTML = thumb.type === 'video'
                    ? `<div class="relative h-16 w-24 bg-white/5"><img src="${thumb.poster || ''}" alt="${thumb.alt || t('galleryItem')}" class="h-full w-full object-cover" /><span class="absolute inset-0 flex items-center justify-center text-white">▶</span></div>`
                    : `<img src="${thumb.src}" alt="${thumb.alt || t('galleryItem')}" class="h-16 w-24 object-cover" />`;
                button.addEventListener('click', () => {
                    lightboxIndex = index;
                    renderLightbox();
                });
                thumbs.appendChild(button);
            });
        }

        function setupZoomEvents(wrapper, content) {
            if (zoomCleanup) {
                zoomCleanup();
                zoomCleanup = null;
            }

            resetZoom();

            const img = content.querySelector('img');
            const syncContentSize = () => {
                fitZoomContent(wrapper, content);
                updateTransform(wrapper, content);
            };

            const zoomBy = (delta, clientX, clientY) => {
                const nextScale = Math.min(Math.max(1, scale + delta), 5);
                zoomToPoint(nextScale, clientX, clientY, wrapper, content);
            };

            const onWheel = (e) => {
                e.preventDefault();
                zoomBy(e.deltaY > 0 ? -0.2 : 0.2, e.clientX, e.clientY);
            };

            const startDrag = (e) => {
                if (e.touches && e.touches.length === 2) {
                    pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
                    pinchStartScale = scale;
                    pinchLastCenter = getTouchCenter(e.touches[0], e.touches[1]);
                    isDragging = false;
                    return;
                }

                if (scale <= 1) return;
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX - translateX;
                startY = clientY - translateY;
            };

            const moveDrag = (e) => {
                if (e.touches && e.touches.length === 2) {
                    e.preventDefault();
                    const nextDistance = getDistance(e.touches[0], e.touches[1]);
                    const center = getTouchCenter(e.touches[0], e.touches[1]);

                    if (pinchLastCenter) {
                        translateX += center.x - pinchLastCenter.x;
                        translateY += center.y - pinchLastCenter.y;
                    }

                    if (pinchStartDistance > 0) {
                        const scaleFactor = nextDistance / pinchStartDistance;
                        const nextScale = Math.min(Math.max(1, pinchStartScale * scaleFactor), 5);
                        zoomToPoint(nextScale, center.x, center.y, wrapper, content);
                    } else {
                        updateTransform(wrapper, content);
                    }

                    pinchLastCenter = center;
                    return;
                }

                if (!isDragging) return;
                if (e.touches) e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                translateX = clientX - startX;
                translateY = clientY - startY;
                updateTransform(wrapper, content);
            };

            const endDrag = () => {
                isDragging = false;
                pinchStartDistance = 0;
                pinchStartScale = scale;
                pinchLastCenter = null;
            };

            const handleTap = (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    if (scale > 1) resetZoom();
                    else zoomToPoint(2.5, e.clientX, e.clientY, wrapper, content);
                }
                lastTap = now;
            };

            if (img) {
                if (img.complete) syncContentSize();
                else img.addEventListener('load', syncContentSize, { once: true });
            }

            wrapper.addEventListener('wheel', onWheel, { passive: false });
            wrapper.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', moveDrag);
            window.addEventListener('mouseup', endDrag);
            wrapper.addEventListener('touchstart', startDrag, { passive: false });
            wrapper.addEventListener('touchmove', moveDrag, { passive: false });
            wrapper.addEventListener('touchend', endDrag);
            wrapper.addEventListener('touchcancel', endDrag);
            wrapper.addEventListener('click', handleTap);
            window.addEventListener('resize', syncContentSize);

            zoomCleanup = () => {
                wrapper.removeEventListener('wheel', onWheel);
                wrapper.removeEventListener('mousedown', startDrag);
                window.removeEventListener('mousemove', moveDrag);
                window.removeEventListener('mouseup', endDrag);
                wrapper.removeEventListener('touchstart', startDrag);
                wrapper.removeEventListener('touchmove', moveDrag);
                wrapper.removeEventListener('touchend', endDrag);
                wrapper.removeEventListener('touchcancel', endDrag);
                wrapper.removeEventListener('click', handleTap);
                window.removeEventListener('resize', syncContentSize);
            };
        }

        function openLightbox(items, startIndex) {
            lightboxItems = items;
            lightboxIndex = startIndex || 0;
            renderLightbox();
            lightbox.classList.add('is-open');
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            if (activePlyr) {
                activePlyr.destroy();
                activePlyr = null;
            }
            if (zoomCleanup) {
                zoomCleanup();
                zoomCleanup = null;
            }

            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            stage.innerHTML = '';
            thumbs.innerHTML = '';
            document.body.style.overflow = '';
        }

        function stepLightbox(delta) {
            if (!lightboxItems.length) return;
            lightboxIndex = (lightboxIndex + delta + lightboxItems.length) % lightboxItems.length;
            renderLightbox();
        }

        closeBtn.addEventListener('click', closeLightbox);
        lightboxBackdrop.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', () => stepLightbox(-1));
        nextBtn.addEventListener('click', () => stepLightbox(1));
        stage.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].clientX;
            touchDeltaX = 0;
        }, { passive: true });
        stage.addEventListener('touchmove', (event) => {
            touchDeltaX = event.changedTouches[0].clientX - touchStartX;
        }, { passive: true });
        stage.addEventListener('touchend', () => {
            if (scale > 1) return;
            if (Math.abs(touchDeltaX) > 45) stepLightbox(touchDeltaX > 0 ? -1 : 1);
        }, { passive: true });

        document.addEventListener('click', (event) => {
            if (!openCardId) return;
            const insideCard = event.target.closest('article');
            if (!insideCard) closeDescriptions();
        });

        document.addEventListener('keydown', (event) => {
            if (lightbox.classList.contains('is-open')) {
                if (event.key === 'Escape') closeLightbox();
                if (event.key === 'ArrowLeft') stepLightbox(-1);
                if (event.key === 'ArrowRight') stepLightbox(1);
                return;
            }
            if (event.key === 'Escape' && openCardId) closeDescriptions();
        });

        langButtons.forEach((btn) => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
        tabButtons.forEach((btn) => btn.addEventListener('click', () => setTab(btn.dataset.tab)));

        updateLangUI();
        setTab('rent');
    });
</script>
</body>
</html>
