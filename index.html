<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polex Estate</title>
    <link rel="icon" type="image/png" href="./assets/polex-estate-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Подключаем стили Fancybox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.5/dist/fancybox/fancybox.css" />

    <style>
        .card-shadow { box-shadow: 0 18px 50px rgba(28, 25, 23, .08); }
        .dark .card-shadow { box-shadow: 0 18px 50px rgba(0, 0, 0, .4); }

        .reveal {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity .55s ease, transform .55s ease, background-color .3s ease, border-color .3s ease;
        }
        .reveal.is-visible { opacity: 1; transform: translateY(0); }

        .media-thumb img { transition: transform .45s ease; }
        .media-thumb:hover img { transform: scale(1.04); }
        .card-desc {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .34s ease, opacity .22s ease, margin-top .22s ease;
            margin-top: 0;
        }
        .card-desc.is-open { opacity: 1; margin-top: 1rem; }
        .lang-btn.is-active,
        .tab-btn.is-active {
            background: #1c1917 !important;
            color: #fff !important;
            box-shadow: 0 2px 10px rgba(28,25,23,.12) !important;
        }
        .dark .lang-btn.is-active,
        .dark .tab-btn.is-active {
            background: #f5f5f4 !important;
            color: #1c1917 !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.3) !important;
        }

        /* Кастомизация Fancybox под темную/светлую тему */
        .fancybox__container {
            --fancybox-bg: rgba(0, 0, 0, 0.95);
            --fancybox-color: #fff;
        }

        /* Корректное отображение вертикальных видео в Fancybox (Десктоп - по умолчанию) */
        .fancybox__container .fancybox__content:has(video),
        .fancybox__container .fancybox__content:has(iframe) {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: auto !important;
            height: auto !important;
            max-width: min(92vw, 520px) !important;
            max-height: 92vh !important;
            padding: 0 !important;
            background: transparent !important;
        }
        .fancybox__container .f-html5video,
        .fancybox__container .f-video,
        .fancybox__container video,
        .fancybox__container iframe {
            display: block !important;
            width: auto !important;
            height: auto !important;
            max-width: min(92vw, 520px) !important;
            max-height: 92vh !important;
            aspect-ratio: auto !important;
            object-fit: contain !important;
        }

        /* Мобильные устройства (включая альбомную ориентацию телефонов) - видео на весь экран как фото */
        @media (max-width: 767px), (max-height: 499px) {
            .fancybox__container .fancybox__content:has(video),
            .fancybox__container .fancybox__content:has(iframe) {
                max-height: 100dvh !important;
                max-width: 100vw !important;
                margin-bottom: 0 !important;
                margin-top: 0 !important;
            }
            .fancybox__container .f-html5video,
            .fancybox__container .f-video,
            .fancybox__container video,
            .fancybox__container iframe {
                max-width: 100vw !important;
                max-height: 100dvh !important;
            }
        }

        /* Отступ сверху на десктопе, чтобы видео не уходило за верхнюю грань */
        @media (min-width: 768px) and (min-height: 500px) {
            .fancybox__container .fancybox__content:has(video),
            .fancybox__container .fancybox__content:has(iframe) {
                margin-top: 64px !important;
                max-height: calc(92vh - 64px) !important;
            }
            .fancybox__container .f-html5video,
            .fancybox__container .f-video,
            .fancybox__container video,
            .fancybox__container iframe {
                max-height: calc(92vh - 64px) !important;
            }
        }

        /* Скрываем подпись (caption) */
        .fancybox__caption {
            display: none !important;
        }
    </style>
</head>
<body class="overflow-x-hidden bg-stone-50 text-stone-900 antialiased transition-colors duration-300 dark:bg-stone-950 dark:text-stone-100">
<header class="sticky top-0 z-30 border-b border-stone-200/80 bg-white/90 backdrop-blur transition-colors duration-300 dark:border-stone-800 dark:bg-stone-950/90">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex min-w-0 items-center gap-3">
            <img src="./assets/polex-estate-logo.png" alt="Polex Estate" class="h-12 w-12 rounded-2xl border border-stone-200 object-cover sm:h-14 sm:w-14 dark:border-stone-700" onerror="this.src='https://placehold.co/100x100/e7e5e4/78716c?text=PE'" />
            <div class="min-w-0">
                <div class="truncate text-lg font-semibold tracking-tight text-stone-900 sm:text-xl dark:text-white">Polex Estate</div>
                <div id="brandSubtitle" class="hidden md:inline truncate text-sm text-stone-500 dark:text-stone-400"></div>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <button id="themeToggle" type="button" class="inline-flex h-[38px] w-[38px] items-center justify-center rounded-full border border-stone-200 bg-white text-stone-500 shadow-sm transition hover:bg-stone-100 hover:text-stone-900 dark:border-stone-700 dark:bg-stone-800 dark:text-stone-400 dark:hover:bg-stone-700 dark:hover:text-stone-100" aria-label="Toggle dark mode">
                <svg id="themeIconSun" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg id="themeIconMoon" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>

            <!-- Переключатель языков для десктопа (горизонтальный) -->
            <div class="hidden sm:inline-flex rounded-full border border-stone-200 bg-white p-1 shadow-sm transition-colors duration-300 dark:border-stone-700 dark:bg-stone-800">
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="ru">RU</button>
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="uk">UA</button>
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="it">IT</button>
            </div>

            <!-- Переключатель языков для мобильных (выпадающий список) -->
            <div class="relative sm:hidden">
                <button id="mobileLangToggle" type="button" class="inline-flex h-[38px] items-center justify-center gap-1.5 rounded-full border border-stone-200 bg-white pl-3 pr-2 text-sm font-medium text-stone-700 shadow-sm transition hover:bg-stone-100 dark:border-stone-700 dark:bg-stone-800 dark:text-stone-300 dark:hover:bg-stone-700">
                    <span id="mobileLangCurrent">RU</span>
                    <svg class="h-4 w-4 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </button>
                <div id="mobileLangDropdown" class="absolute right-0 top-full mt-2 hidden z-40 w-20 flex-col gap-1 rounded-2xl border border-stone-200 bg-white p-1 shadow-lg dark:border-stone-700 dark:bg-stone-800">
                    <button type="button" class="lang-btn rounded-xl px-3 py-2 text-center text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="ru">RU</button>
                    <button type="button" class="lang-btn rounded-xl px-3 py-2 text-center text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="uk">UA</button>
                    <button type="button" class="lang-btn rounded-xl px-3 py-2 text-center text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="it">IT</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8 lg:py-10">
    <div class="mb-6 flex justify-center sm:mb-8">
        <div class="inline-flex rounded-full border border-stone-200 bg-white p-1 shadow-sm transition-colors duration-300 dark:border-stone-700 dark:bg-stone-800">
            <button type="button" class="tab-btn rounded-full px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-tab="rent"></button>
            <button type="button" class="tab-btn rounded-full px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-tab="future"></button>
        </div>
    </div>

    <!-- Счетчик отображаемых объявлений в виде бейджа -->
    <div id="resultsCountContainer" class="mb-4 hidden sm:mb-6">
        <span id="resultsCount" class="inline-flex items-center px-3.5 py-1.5 text-sm font-medium text-stone-600 transition-colors duration-300 dark:text-stone-300"></span>
    </div>

    <div id="emptyState" class="hidden rounded-[2rem] border border-dashed border-stone-300 bg-white px-6 py-12 text-center text-stone-600 dark:border-stone-700 dark:bg-stone-900/50 dark:text-stone-400"></div>
    <div id="apartmentsGrid" class="grid items-start gap-5 sm:grid-cols-2 xl:grid-cols-3"></div>
</main>

<!-- Подключаем скрипт Fancybox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.5/dist/fancybox/fancybox.umd.js"></script>

<script>
    window.__APARTMENTS = [];
    window.registerApartment = function(apartment) {
        if (apartment) window.__APARTMENTS.push(apartment);
    };
</script>
<script src="./apartments-registry.js"></script>
<script>
    (function loadApartmentFiles() {
        const files = Array.isArray(window.APARTMENT_FILES) ? window.APARTMENT_FILES : [];
        files.forEach((src) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = false;
            document.body.appendChild(script);
        });
    })();
</script>
<script>
    window.addEventListener('load', function () {
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIconSun = document.getElementById('themeIconSun');
        const themeIconMoon = document.getElementById('themeIconMoon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeIconSun.classList.remove('hidden');
                themeIconMoon.classList.add('hidden');
            } else {
                themeIconSun.classList.add('hidden');
                themeIconMoon.classList.remove('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            updateThemeIcons();
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
        updateThemeIcons();

        // --- КЭШ И ФОНОВАЯ ЗАГРУЗКА МЕТАДАННЫХ ВИДЕО ---
        const videoMetaCache = {};
        function preloadVideoMeta(src) {
            if (videoMetaCache[src]) return videoMetaCache[src];

            const promise = new Promise((resolve) => {
                let resolved = false;
                const finish = (w, h) => {
                    if (resolved) return;
                    resolved = true;
                    resolve({ w, h });
                };

                const video = document.createElement('video');
                video.preload = 'metadata';
                video.src = src;

                video.onloadedmetadata = () => finish(video.videoWidth || 720, video.videoHeight || 1280);
                video.onerror = () => finish(720, 1280);

                // Тайм-аут 1 секунда, чтобы не зависать навечно при медленном интернете
                setTimeout(() => finish(720, 1280), 1000);
            });

            videoMetaCache[src] = promise;
            return promise;
        }

        const apartments = Array.isArray(window.__APARTMENTS) ? window.__APARTMENTS.filter(Boolean) : [];
        const grid = document.getElementById('apartmentsGrid');
        const emptyState = document.getElementById('emptyState');
        const resultsCountContainer = document.getElementById('resultsCountContainer');
        const resultsCount = document.getElementById('resultsCount');
        const langButtons = Array.from(document.querySelectorAll('.lang-btn'));
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
        const brandSubtitle = document.getElementById('brandSubtitle');

        const mobileLangToggle = document.getElementById('mobileLangToggle');
        const mobileLangDropdown = document.getElementById('mobileLangDropdown');
        const mobileLangCurrent = document.getElementById('mobileLangCurrent');
        const langLabels = { ru: 'RU', uk: 'UA', it: 'IT' };

        if (mobileLangToggle && mobileLangDropdown) {
            mobileLangToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileLangDropdown.classList.toggle('hidden');
                mobileLangDropdown.classList.toggle('flex');
            });

            document.addEventListener('click', (e) => {
                if (!mobileLangToggle.contains(e.target) && !mobileLangDropdown.contains(e.target)) {
                    mobileLangDropdown.classList.add('hidden');
                    mobileLangDropdown.classList.remove('flex');
                }
            });
        }

        const materialsIcon = '<svg viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;width:1em;height:1em;vertical-align:-0.125em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="18" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5.5-5.5a1 1 0 0 0-1.4 0L8 16"/><path d="M13 16l-2.5-2.5a1 1 0 0 0-1.4 0L6.5 16"/></svg>';

        const ui = {
            ru: {
                subtitle: 'Аренда квартир в Турине',
                rentTab: 'Аренда',
                futureTab: 'Будущая аренда',
                details: 'Подробнее',
                hide: 'Скрыть',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Скоро здесь появятся новые варианты.',
                galleryItem: 'Материал',
                shown: 'Доступно вариантов: {n}'
            },
            uk: {
                subtitle: 'Оренда квартир у Турині',
                rentTab: 'Оренда',
                futureTab: 'Майбутня оренда',
                details: 'Детальніше',
                hide: 'Сховати',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Незабаром тут зʼявляться нові варіанти.',
                galleryItem: 'Матеріал',
                shown: 'Доступно варіантів: {n}'
            },
            it: {
                subtitle: 'Affitti a Torino',
                rentTab: 'Affitto',
                futureTab: 'Prossime disponibilità',
                details: 'Dettagli',
                hide: 'Chiudi',
                whatsapp: 'WhatsApp',
                materials: materialsIcon,
                empty: 'Presto qui compariranno nuove soluzioni.',
                galleryItem: 'Contenuto',
                shown: 'Soluzioni disponibili: {n}'
            }
        };

        function getPreferredLang() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && ui[urlLang]) return urlLang;
            const saved = localStorage.getItem('polexLang');
            if (saved && ui[saved]) return saved;
            const browserLang = (navigator.language || 'ru').slice(0, 2).toLowerCase();
            if (ui[browserLang]) return browserLang;
            return 'ru';
        }

        let currentLang = getPreferredLang();
        let activeTab = 'rent';
        let openCardId = null;
        const galleryRegistry = new Map();

        function startFancyboxFromUrl() {
            const HashPlugin = Fancybox?.Plugins?.Hash;

            if (!HashPlugin || Fancybox.getInstance()) return;

            const parsed = HashPlugin.parseURL();
            if (!parsed || !parsed.slug) return;

            const gallery = galleryRegistry.get(parsed.slug);
            if (!gallery) return;

            Fancybox.show(gallery.items, {
                ...gallery.options,
                startIndex: Math.max(0, (parsed.index || 1) - 1),
            });
        }

        window.addEventListener('hashchange', startFancyboxFromUrl, false);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });

        function t(key) {
            return ui[currentLang][key] || ui.ru[key] || '';
        }

        function getLocalizedValue(apartment, key) {
            const i18n = apartment.i18n || {};
            const direct = apartment[key];
            const val = i18n[currentLang]?.[key] ?? i18n.ru?.[key] ?? direct;
            return typeof val === 'string' ? val.trim() : (val || '');
        }

        function localized(apartment) {
            return {
                title: getLocalizedValue(apartment, 'title'),
                price: getLocalizedValue(apartment, 'price'),
                address: getLocalizedValue(apartment, 'address'),
                description: getLocalizedValue(apartment, 'description'),
                mapsUrl: getLocalizedValue(apartment, 'mapsUrl') || apartment.mapsUrl || ''
            };
        }

        function listingType(apartment) {
            return apartment.listingType === 'future' ? 'future' : 'rent';
        }

        function mediaItems(apartment) {
            const gallery = Array.isArray(apartment.gallery) ? apartment.gallery : [];
            return gallery.filter((item) => item && item.src);
        }

        function updateLangUI() {
            document.documentElement.lang = currentLang;
            document.title = 'Polex Estate';
            brandSubtitle.textContent = t('subtitle');
            emptyState.textContent = t('empty');
            tabButtons.forEach((btn) => {
                btn.textContent = btn.dataset.tab === 'rent' ? t('rentTab') : t('futureTab');
            });
            langButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.lang === currentLang));

            if (mobileLangCurrent) {
                mobileLangCurrent.textContent = langLabels[currentLang] || currentLang.toUpperCase();
            }
            if (mobileLangDropdown) {
                mobileLangDropdown.classList.add('hidden');
                mobileLangDropdown.classList.remove('flex');
            }
        }

        function createCard(apartment, index) {
            const data = localized(apartment);
            const article = document.createElement('article');
            const cardId = apartment.id || `apartment-${index}`;

            article.className = 'reveal self-start overflow-hidden rounded-[2rem] border border-stone-200/80 bg-white dark:border-stone-800 dark:bg-stone-900 card-shadow';

            const media = mediaItems(apartment);
            const materialsLabel = `${media.length || 1} ${t('materials')}`;
            const hasPrice = Boolean(data.price);
            const hasTitle = Boolean(data.title);
            const mapsHref = data.mapsUrl || '#';
            const safeCover = apartment.cover || media[0]?.src || 'https://placehold.co/1200x900/e7e5e4/78716c?text=Polex+Estate';

            article.innerHTML = `
          <button type="button" class="media-open media-thumb relative block w-full overflow-hidden bg-stone-100 dark:bg-stone-800 text-left">
            <img src="${safeCover}" alt="${hasTitle ? data.title : 'Polex Estate'}" class="block w-full max-h-[75vh] object-contain bg-black" onerror="this.src='https://placehold.co/1200x900/e7e5e4/78716c?text=Image+Not+Found'"/>
            <span class="absolute bottom-3 right-3 rounded-full bg-black/70 px-3 py-1.5 text-xs font-medium text-white">${materialsLabel}</span>
          </button>
          <div class="flex flex-col p-4 sm:p-5">
            <div class="flex min-h-[145px] flex-col">
              <div class="min-h-[48px]">
                ${hasPrice ? `<div class="inline-flex rounded-full border border-amber-300 bg-amber-50 px-4 py-2 text-base font-semibold text-amber-800 dark:border-amber-500/30 dark:bg-amber-900/20 dark:text-amber-300">${data.price}</div>` : ''}
              </div>
              <div class="flex min-h-[64px] items-center">
                ${hasTitle ? `<h3 class="line-clamp-2 text-2xl font-semibold leading-tight tracking-tight text-stone-900 dark:text-white">${data.title}</h3>` : ''}
              </div>
              <div class="flex min-h-[33px] items-start mt-2">
                ${data.address ? `<a href="${mapsHref}" target="_blank" rel="noreferrer" class="inline-flex items-start gap-2 text-base leading-7 text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-200"><span class="pt-1 text-pink-500">📍</span><span>${data.address}</span></a>` : ''}
              </div>
            </div>
            <div class="mt-5 flex gap-3">
              <button type="button" data-card-id="${cardId}" class="desc-toggle inline-flex flex-1 items-center justify-center rounded-full border border-stone-300 px-4 py-3 text-sm font-medium text-stone-800 transition hover:border-stone-400 hover:bg-stone-50 dark:border-stone-700 dark:text-stone-200 dark:hover:border-stone-600 dark:hover:bg-stone-800">${t('details')}</button>
              <a href="${apartment.whatsappUrl || '#'}" target="_blank" rel="noreferrer" class="inline-flex flex-1 items-center justify-center rounded-full bg-emerald-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-500">${t('whatsapp')}</a>
            </div>
            <div class="card-desc" data-desc-id="${cardId}">
              <div class="rounded-3xl bg-stone-50 p-5 text-sm leading-8 text-stone-700 whitespace-pre-line dark:bg-stone-800/50 dark:text-stone-300">${data.description}</div>
            </div>
          </div>`;

            // Запускаем предзагрузку метаданных видео НА ФОНЕ сразу при создании карточки
            media.forEach(item => {
                const isLocalVideo = item.src && item.src.match(/\.(mp4|webm|ogg|mov)$/i);
                if (item.type === 'video' || isLocalVideo) {
                    preloadVideoMeta(item.src);
                }
            });

            article.querySelector('.media-open').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                const spinnerId = 'spinner-' + cardId;

                // Показываем лоадер на случай, если данные еще не успели загрузиться на фоне
                if (!document.getElementById(spinnerId)) {
                    btn.insertAdjacentHTML('beforeend', `
                        <div id="${spinnerId}" class="absolute inset-0 z-20 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                            <svg class="h-8 w-8 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </div>
                    `);
                }

                const itemsToLoad = media.length ? media : [{ type: 'image', src: safeCover, alt: hasTitle ? data.title : 'Polex Estate' }];

                const fancyboxData = await Promise.all(itemsToLoad.map(async (item) => {
                    const isLocalVideo = item.src && item.src.match(/\.(mp4|webm|ogg|mov)$/i);
                    const isYouTubeOrVimeo = item.src && item.src.match(/(youtube\.com|youtu\.be|vimeo\.com)/i);
                    const isVideo = item.type === 'video' || isLocalVideo || isYouTubeOrVimeo;

                    if (!isVideo) {
                        return { src: item.src, type: 'image', thumb: item.poster || item.src, caption: item.alt || data.title };
                    }

                    if (isYouTubeOrVimeo) {
                        return { src: item.src, type: 'video', thumb: item.poster || item.src, caption: item.alt || data.title };
                    }

                    // Ждем размеры (обычно они уже в кэше и отдаются моментально благодаря фоновой загрузке)
                    const dims = await preloadVideoMeta(item.src);

                    return {
                        src: item.src,
                        type: 'html5video',
                        thumb: item.poster || item.src,
                        caption: item.alt || data.title,
                        width: dims.w,
                        height: dims.h,
                    };
                }));

                // Убираем лоадер
                const spinner = document.getElementById(spinnerId);
                if (spinner) spinner.remove();

                const gallerySlug = `apartment-${cardId}`;

                const galleryOptions = {
                    slug: gallerySlug,
                    Images: {
                        zoom: true,
                        Panzoom: {
                            maxScale: 3
                        }
                    },
                    Thumbs: { type: "modern" },
                    Toolbar: {
                        display: {
                            left: ["infobar"],
                            middle: [],
                            right: ["fullscreen", "thumbs", "close"],
                        },
                    }
                };

                galleryRegistry.set(gallerySlug, {
                    items: fancyboxData,
                    options: galleryOptions
                });

                Fancybox.show(fancyboxData, galleryOptions);
            });

            article.querySelector('.desc-toggle').addEventListener('click', (event) => {
                event.stopPropagation();
                toggleDescription(cardId, article);
            });
            observer.observe(article);
            return article;
        }

        function syncDescButtons() {
            document.querySelectorAll('.desc-toggle').forEach((btn) => {
                btn.textContent = btn.dataset.cardId === openCardId ? t('hide') : t('details');
            });
        }

        function closeDescriptions() {
            document.querySelectorAll('.card-desc').forEach((block) => {
                block.classList.remove('is-open');
                block.style.maxHeight = '0px';
            });
            openCardId = null;
            syncDescButtons();
        }

        function openDescription(cardId) {
            document.querySelectorAll('.card-desc').forEach((block) => {
                const same = block.dataset.descId === cardId;
                block.classList.toggle('is-open', same);
                block.style.maxHeight = same ? block.scrollHeight + 'px' : '0px';
            });
            openCardId = cardId;
            syncDescButtons();
        }

        function toggleDescription(cardId, article) {
            if (openCardId === cardId) {
                closeDescriptions();
                return;
            }

            openDescription(cardId);

            if (article) {
                const scrollToCardBottom = () => {
                    const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                    const bottomGap = window.innerWidth < 768 ? 10 : 18;
                    const articleRect = article.getBoundingClientRect();
                    const visibleBottom = viewportHeight - bottomGap;

                    if (articleRect.bottom <= visibleBottom) return;

                    const targetTop = window.scrollY + articleRect.bottom - viewportHeight + bottomGap;

                    window.scrollTo({
                        top: Math.max(0, targetTop),
                        behavior: 'smooth'
                    });
                };

                const desc = article.querySelector(`.card-desc[data-desc-id="${cardId}"]`);
                if (desc) {
                    let didScroll = false;
                    const runScroll = () => {
                        if (didScroll) return;
                        didScroll = true;
                        scrollToCardBottom();
                    };

                    const onTransitionEnd = (event) => {
                        if (event.propertyName !== 'max-height') return;
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    };

                    desc.addEventListener('transitionend', onTransitionEnd);
                    setTimeout(() => {
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    }, 420);
                }
            }
        }

        function renderGrid() {
            const visible = apartments.filter((item) => listingType(item) === activeTab);
            grid.innerHTML = '';
            closeDescriptions();

            if (visible.length > 0) {
                emptyState.classList.add('hidden');
                resultsCount.textContent = t('shown').replace('{n}', visible.length);
                resultsCountContainer.classList.remove('hidden');

                visible.forEach((apartment, index) => grid.appendChild(createCard(apartment, index)));
            } else {
                emptyState.classList.remove('hidden');
                resultsCountContainer.classList.add('hidden');
            }
        }

        function setLang(lang) {
            currentLang = ui[lang] ? lang : 'ru';
            localStorage.setItem('polexLang', currentLang);
            const url = new URL(window.location.href);
            url.searchParams.set('lang', currentLang);
            window.history.replaceState({}, '', url.toString());
            updateLangUI();
            renderGrid();
        }

        function setTab(tab) {
            activeTab = tab === 'future' ? 'future' : 'rent';
            tabButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.tab === activeTab));
            renderGrid();
        }

        document.addEventListener('click', (event) => {
            if (!openCardId) return;
            // Убеждаемся, что клик не был внутри Fancybox, чтобы не закрывать описание при взаимодействии с галереей
            if (event.target.closest('.fancybox__container')) return;

            const insideCard = event.target.closest('article');
            if (!insideCard) closeDescriptions();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && openCardId) {
                // Если открыт Fancybox, он сам обработает Escape, нам не нужно закрывать описание
                if (!document.querySelector('.fancybox__container')) {
                    closeDescriptions();
                }
            }
        });

        langButtons.forEach((btn) => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
        tabButtons.forEach((btn) => btn.addEventListener('click', () => setTab(btn.dataset.tab)));

        updateLangUI();
        setTab('rent');
        startFancyboxFromUrl();
    });
</script>
</body>
</html>
