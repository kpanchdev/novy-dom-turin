<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polex Estate</title>
    <link rel="icon" type="image/png" href="./assets/polex-estate-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body { overflow-x: hidden; }
        .card-shadow { box-shadow: 0 18px 50px rgba(28, 25, 23, .08); }
        .dark .card-shadow { box-shadow: 0 18px 50px rgba(0, 0, 0, .4); }
        .reveal {
            opacity: 0;
            transform: translateY(26px);
            transition: opacity .72s ease-out, transform .72s ease-out;
            will-change: opacity, transform;
        }
        .reveal.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .media-thumb img { transition: transform .45s ease; }
        .media-thumb:hover img { transform: scale(1.04); }
        .card-desc {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height .34s ease, opacity .22s ease, margin-top .22s ease;
            margin-top: 0;
        }
        .card-desc.is-open { opacity: 1; margin-top: 1rem; }
        .lightbox { opacity: 0; pointer-events: none; transition: opacity .18s ease; }
        .lightbox.is-open { opacity: 1; pointer-events: auto; }
        .lang-btn.is-active,
        .tab-btn.is-active {
            background: #1c1917 !important;
            color: #fff !important;
            box-shadow: 0 2px 10px rgba(28,25,23,.12) !important;
        }
        .dark .lang-btn.is-active,
        .dark .tab-btn.is-active {
            background: #f5f5f4 !important;
            color: #1c1917 !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.3) !important;
        }

        /* Стили для корректного отображения Plyr в лайтбоксе */
        #lightboxStage .plyr {
            width: fit-content !important;
            max-width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            --plyr-color-main: #10b981;
            margin: 0 auto;
        }

        #lightboxStage .plyr__video-wrapper {
            width: fit-content !important;
            max-width: 100%;
        }

        #lightboxStage .plyr video {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 75vh !important;
        }

        @media (max-width: 767px) {
            #lightbox {
                padding-top: 12px;
                padding-bottom: 12px;
            }

            #lightboxStage .plyr {
                max-width: 92vw !important;
                border-radius: 0.875rem;
            }

            #lightboxStage .plyr__video-wrapper {
                max-width: 92vw !important;
            }

            #lightboxStage .plyr video {
                max-height: 58vh !important;
            }

            #lightboxThumbs {
                margin-top: 12px;
            }
        }
        #lightboxStage .plyr.plyr--fullscreen,
        #lightboxStage .plyr:fullscreen,
        :fullscreen {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
        }

        #lightboxStage .plyr.plyr--fullscreen .plyr__video-wrapper,
        #lightboxStage .plyr:fullscreen .plyr__video-wrapper,
        :fullscreen .plyr__video-wrapper {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
        }

        #lightboxStage .plyr.plyr--fullscreen video,
        #lightboxStage .plyr:fullscreen video,
        video:fullscreen,
        #lightboxStage .plyr.plyr--fullscreen .plyr__video-wrapper video,
        :fullscreen .plyr__video-wrapper video {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            object-fit: contain !important;   /* ← растягивает на весь экран (обрезает края если нужно). Если не хотите обрезать вертикальные видео - замените на contain */
            border-radius: 0 !important;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 antialiased transition-colors duration-300 dark:bg-stone-950 dark:text-stone-100">
<header class="sticky top-0 z-30 border-b border-stone-200/80 bg-white/90 backdrop-blur transition-colors duration-300 dark:border-stone-800 dark:bg-stone-950/90">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex min-w-0 items-center gap-3">
            <img src="./assets/polex-estate-logo.png" alt="Polex Estate" class="h-12 w-12 rounded-2xl border border-stone-200 object-cover sm:h-14 sm:w-14 dark:border-stone-700" />
            <div class="min-w-0">
                <div class="truncate text-lg font-semibold tracking-tight text-stone-900 sm:text-xl dark:text-white">Polex Estate</div>
                <div id="brandSubtitle" class="truncate text-sm text-stone-500 dark:text-stone-400"></div>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <button id="themeToggle" type="button" class="inline-flex h-[38px] w-[38px] items-center justify-center rounded-full border border-stone-200 bg-white text-stone-500 shadow-sm transition hover:bg-stone-100 hover:text-stone-900 dark:border-stone-700 dark:bg-stone-800 dark:text-stone-400 dark:hover:bg-stone-700 dark:hover:text-stone-100" aria-label="Toggle dark mode">
                <svg id="themeIconSun" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg id="themeIconMoon" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
            <div class="inline-flex rounded-full border border-stone-200 bg-white p-1 shadow-sm transition-colors duration-300 dark:border-stone-700 dark:bg-stone-800">
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="ru">RU</button>
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="uk">UA</button>
                <button type="button" class="lang-btn rounded-full px-3 py-1.5 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-lang="it">IT</button>
            </div>
        </div>
    </div>
</header>

<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8 lg:py-10">
    <div class="mb-6 flex justify-center sm:mb-8">
        <div class="inline-flex rounded-full border border-stone-200 bg-white p-1 shadow-sm transition-colors duration-300 dark:border-stone-700 dark:bg-stone-800">
            <button type="button" class="tab-btn rounded-full px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-tab="rent"></button>
            <button type="button" class="tab-btn rounded-full px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-700" data-tab="future"></button>
        </div>
    </div>

    <div id="emptyState" class="hidden rounded-[2rem] border border-dashed border-stone-300 bg-white px-6 py-12 text-center text-stone-600 dark:border-stone-700 dark:bg-stone-900/50 dark:text-stone-400"></div>
    <div id="apartmentsGrid" class="grid items-start gap-5 sm:grid-cols-2 xl:grid-cols-3"></div>
</main>

<div id="lightbox" class="lightbox fixed inset-0 z-50 bg-black/95 px-3 py-4 sm:px-6 sm:py-6" aria-hidden="true">
    <div id="lightboxBackdrop" class="absolute inset-0"></div>
    <div class="relative mx-auto flex h-full max-w-6xl flex-col">
        <div class="mb-3 flex items-center justify-between gap-3 text-white">
            <div class="min-w-0">
                <div id="lightboxCounter" class="text-sm font-medium text-white/75"></div>
                <div id="lightboxCaption" class="truncate text-base font-medium"></div>
            </div>
            <button id="lightboxClose" type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/20 bg-black/30 text-white transition hover:bg-white/10" aria-label="Close gallery">
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
        </div>
        <div class="relative flex min-h-0 flex-1 items-center justify-center">
            <button id="lightboxPrev" type="button" class="absolute left-0 top-1/2 z-10 inline-flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full border border-white/20 bg-black/30 text-white transition hover:bg-white/10 sm:left-3" aria-label="Previous">
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div id="lightboxStage" class="relative flex h-full w-full items-center justify-center"></div>
            <button id="lightboxNext" type="button" class="absolute right-0 top-1/2 z-10 inline-flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full border border-white/20 bg-black/30 text-white transition hover:bg-white/10 sm:right-3" aria-label="Next">
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
        </div>
        <div id="lightboxThumbs" class="mt-4 flex gap-2 overflow-x-auto pb-1"></div>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    window.__APARTMENTS = [];
    window.registerApartment = function(apartment) {
        if (apartment) window.__APARTMENTS.push(apartment);
    };
</script>
<script src="./apartments-registry.js"></script>
<script>
    (function loadApartmentFiles() {
        const files = Array.isArray(window.APARTMENT_FILES) ? window.APARTMENT_FILES : [];
        files.forEach((src) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = false;
            document.body.appendChild(script);
        });
    })();
</script>
<script>
    window.addEventListener('load', function () {
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIconSun = document.getElementById('themeIconSun');
        const themeIconMoon = document.getElementById('themeIconMoon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeIconSun.classList.remove('hidden');
                themeIconMoon.classList.add('hidden');
            } else {
                themeIconSun.classList.add('hidden');
                themeIconMoon.classList.remove('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            updateThemeIcons();
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
        updateThemeIcons();

        const apartments = Array.isArray(window.__APARTMENTS) ? window.__APARTMENTS.filter(Boolean) : [];
        const grid = document.getElementById('apartmentsGrid');
        const emptyState = document.getElementById('emptyState');
        const langButtons = Array.from(document.querySelectorAll('.lang-btn'));
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
        const brandSubtitle = document.getElementById('brandSubtitle');

        const ui = {
            ru: {
                subtitle: 'Аренда квартир в Турине',
                rentTab: 'Аренда',
                futureTab: 'Будущая аренда',
                details: 'Подробнее',
                hide: 'Скрыть',
                whatsapp: 'WhatsApp',
                materials: '<svg viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;width:1em;height:1em;vertical-align:-0.125em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="18" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5.5-5.5a1 1 0 0 0-1.4 0L8 16"/><path d="M13 16l-2.5-2.5a1 1 0 0 0-1.4 0L6.5 16"/></svg>',
                empty: 'Скоро здесь появятся новые варианты.',
                galleryItem: 'Материал'
            },
            uk: {
                subtitle: 'Оренда квартир у Турині',
                rentTab: 'Оренда',
                futureTab: 'Майбутня оренда',
                details: 'Детальніше',
                hide: 'Сховати',
                whatsapp: 'WhatsApp',
                materials: '<svg viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;width:1em;height:1em;vertical-align:-0.125em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="18" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5.5-5.5a1 1 0 0 0-1.4 0L8 16"/><path d="M13 16l-2.5-2.5a1 1 0 0 0-1.4 0L6.5 16"/></svg>',
                empty: 'Незабаром тут зʼявляться нові варіанти.',
                galleryItem: 'Матеріал'
            },
            it: {
                subtitle: 'Affitti a Torino',
                rentTab: 'Affitto',
                futureTab: 'Prossime disponibilità',
                details: 'Dettagli',
                hide: 'Chiudi',
                whatsapp: 'WhatsApp',
                materials: '<svg viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;width:1em;height:1em;vertical-align:-0.125em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="18" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5.5-5.5a1 1 0 0 0-1.4 0L8 16"/><path d="M13 16l-2.5-2.5a1 1 0 0 0-1.4 0L6.5 16"/></svg>',
                empty: 'Presto qui compariranno nuove soluzioni.',
                galleryItem: 'Contenuto'
            }
        };

        function getPreferredLang() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && ui[urlLang]) return urlLang;
            const saved = localStorage.getItem('polexLang');
            if (saved && ui[saved]) return saved;
            const browserLang = (navigator.language || 'ru').slice(0, 2).toLowerCase();
            if (ui[browserLang]) return browserLang;
            return 'ru';
        }

        let currentLang = getPreferredLang();
        let activeTab = 'rent';
        let openCardId = null;

        const lightbox = document.getElementById('lightbox');
        const lightboxBackdrop = document.getElementById('lightboxBackdrop');
        const stage = document.getElementById('lightboxStage');
        const caption = document.getElementById('lightboxCaption');
        const counter = document.getElementById('lightboxCounter');
        const thumbs = document.getElementById('lightboxThumbs');
        const closeBtn = document.getElementById('lightboxClose');
        const prevBtn = document.getElementById('lightboxPrev');
        const nextBtn = document.getElementById('lightboxNext');
        let lightboxItems = [];
        let lightboxIndex = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchDeltaX = 0;
        let touchDeltaY = 0;
        let touchStartTime = 0;

        // Переменная для хранения активного экземпляра Plyr
        let activePlyr = null;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.12,
            rootMargin: '0px 0px -40px 0px'
        });

        function t(key) {
            return ui[currentLang][key] || ui.ru[key] || '';
        }

        function getLocalizedValue(apartment, key) {
            const i18n = apartment.i18n || {};
            const direct = apartment[key];
            const val = i18n[currentLang]?.[key] ?? i18n.ru?.[key] ?? direct;
            return typeof val === 'string' ? val.trim() : (val || '');
        }

        function localized(apartment) {
            return {
                title: getLocalizedValue(apartment, 'title'),
                price: getLocalizedValue(apartment, 'price'),
                address: getLocalizedValue(apartment, 'address'),
                description: getLocalizedValue(apartment, 'description'),
                mapsUrl: getLocalizedValue(apartment, 'mapsUrl') || apartment.mapsUrl || ''
            };
        }

        function listingType(apartment) {
            return apartment.listingType === 'future' ? 'future' : 'rent';
        }

        function mediaItems(apartment) {
            const gallery = Array.isArray(apartment.gallery) ? apartment.gallery : [];
            return gallery.filter((item) => item && item.src);
        }

        function updateLangUI() {
            document.documentElement.lang = currentLang;
            document.title = 'Polex Estate';
            brandSubtitle.textContent = t('subtitle');
            emptyState.textContent = t('empty');
            tabButtons.forEach((btn) => {
                btn.textContent = btn.dataset.tab === 'rent' ? t('rentTab') : t('futureTab');
            });
            langButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.lang === currentLang));
        }

        function createCard(apartment, index) {
            const data = localized(apartment);
            const article = document.createElement('article');
            article.className = 'reveal self-start overflow-hidden rounded-[2rem] border border-stone-200/80 bg-white transition-colors duration-300 dark:border-stone-800 dark:bg-stone-900 card-shadow';
            const cardId = apartment.id || `apartment-${index}`;
            article.style.transitionDelay = `${Math.min(index, 5) * 70}ms`;
            const media = mediaItems(apartment);
            const materialsLabel = `${media.length || 1} ${t('materials')}`;
            const hasPrice = Boolean(data.price);
            const hasTitle = Boolean(data.title);
            const mapsHref = data.mapsUrl || '#';
            const safeCover = apartment.cover || media[0]?.src || 'https://placehold.co/1200x900/e7e5e4/78716c?text=Polex+Estate';

            article.innerHTML = `
          <button type="button" class="media-open media-thumb relative block aspect-[4/3] w-full overflow-hidden bg-stone-100 dark:bg-stone-800 text-left">
            <img src="${safeCover}" alt="${hasTitle ? data.title : 'Polex Estate'}" class="h-full w-full object-cover" />
            <span class="absolute bottom-3 right-3 rounded-full bg-black/70 px-3 py-1.5 text-xs font-medium text-white">${materialsLabel}</span>
          </button>
          <div class="flex flex-col p-4 sm:p-5">
            <div class="flex min-h-[145px] flex-col">
              <div class="min-h-[48px]">
                ${hasPrice ? `<div class="inline-flex rounded-full border border-amber-300 bg-amber-50 px-4 py-2 text-base font-semibold text-amber-800 dark:border-amber-500/30 dark:bg-amber-900/20 dark:text-amber-300">${data.price}</div>` : ''}
              </div>
              <div class="flex min-h-[64px] items-center">
                ${hasTitle ? `<h3 class="line-clamp-2 text-2xl font-semibold leading-tight tracking-tight text-stone-900 dark:text-white">${data.title}</h3>` : ''}
              </div>
              <div class="flex min-h-[33px] items-start mt-2">
                ${data.address ? `<a href="${mapsHref}" target="_blank" rel="noreferrer" class="inline-flex items-start gap-2 text-base leading-7 text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-200"><span class="pt-1 text-pink-500">📍</span><span>${data.address}</span></a>` : ''}
              </div>
            </div>
            <div class="mt-5 flex gap-3">
              <button type="button" data-card-id="${cardId}" class="desc-toggle inline-flex flex-1 items-center justify-center rounded-full border border-stone-300 px-4 py-3 text-sm font-medium text-stone-800 transition hover:border-stone-400 hover:bg-stone-50 dark:border-stone-700 dark:text-stone-200 dark:hover:border-stone-600 dark:hover:bg-stone-800">${t('details')}</button>
              <a href="${apartment.whatsappUrl || '#'}" target="_blank" rel="noreferrer" class="inline-flex flex-1 items-center justify-center rounded-full bg-emerald-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-500">${t('whatsapp')}</a>
            </div>
            <div class="card-desc" data-desc-id="${cardId}">
              <div class="rounded-3xl bg-stone-50 p-5 text-sm leading-8 text-stone-700 whitespace-pre-line dark:bg-stone-800/50 dark:text-stone-300">${data.description}</div>
            </div>
          </div>`;

            article.querySelector('.media-open').addEventListener('click', () => openLightbox(media.length ? media : [{ type: 'image', src: safeCover, alt: hasTitle ? data.title : 'Polex Estate' }], 0));
            article.querySelector('.desc-toggle').addEventListener('click', (event) => {
                event.stopPropagation();
                toggleDescription(cardId, article);
            });
            observer.observe(article);
            return article;
        }

        function syncDescButtons() {
            document.querySelectorAll('.desc-toggle').forEach((btn) => {
                btn.textContent = btn.dataset.cardId === openCardId ? t('hide') : t('details');
            });
        }

        function closeDescriptions() {
            document.querySelectorAll('.card-desc').forEach((block) => {
                block.classList.remove('is-open');
                block.style.maxHeight = '0px';
            });
            openCardId = null;
            syncDescButtons();
        }

        function openDescription(cardId) {
            document.querySelectorAll('.card-desc').forEach((block) => {
                const same = block.dataset.descId === cardId;
                block.classList.toggle('is-open', same);
                block.style.maxHeight = same ? block.scrollHeight + 'px' : '0px';
            });
            openCardId = cardId;
            syncDescButtons();
        }
        function toggleDescription(cardId, article) {
            if (openCardId === cardId) {
                closeDescriptions();
                return;
            }

            openDescription(cardId);

            if (article) {
                const scrollToCardBottom = () => {
                    const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                    const bottomGap = window.innerWidth < 768 ? 10 : 18;
                    const articleRect = article.getBoundingClientRect();
                    const visibleBottom = viewportHeight - bottomGap;

                    if (articleRect.bottom <= visibleBottom) return;

                    const targetTop = window.scrollY + articleRect.bottom - viewportHeight + bottomGap;

                    window.scrollTo({
                        top: Math.max(0, targetTop),
                        behavior: 'smooth'
                    });
                };

                const desc = article.querySelector(`.card-desc[data-desc-id="${cardId}"]`);
                if (desc) {
                    let didScroll = false;
                    const runScroll = () => {
                        if (didScroll) return;
                        didScroll = true;
                        scrollToCardBottom();
                    };

                    const onTransitionEnd = (event) => {
                        if (event.propertyName !== 'max-height') return;
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    };

                    desc.addEventListener('transitionend', onTransitionEnd);
                    setTimeout(() => {
                        desc.removeEventListener('transitionend', onTransitionEnd);
                        runScroll();
                    }, 420);
                }
            }
        }

        function renderGrid() {
            const visible = apartments.filter((item) => listingType(item) === activeTab);
            grid.innerHTML = '';
            closeDescriptions();
            emptyState.classList.toggle('hidden', visible.length > 0);
            visible.forEach((apartment, index) => grid.appendChild(createCard(apartment, index)));
        }

        function setLang(lang) {
            currentLang = ui[lang] ? lang : 'ru';
            localStorage.setItem('polexLang', currentLang);
            const url = new URL(window.location.href);
            url.searchParams.set('lang', currentLang);
            window.history.replaceState({}, '', url.toString());
            updateLangUI();
            renderGrid();
        }

        function setTab(tab) {
            activeTab = tab === 'future' ? 'future' : 'rent';
            tabButtons.forEach((btn) => btn.classList.toggle('is-active', btn.dataset.tab === activeTab));
            renderGrid();
        }

        function renderLightbox() {
            // Очищаем старый плеер, если он был
            if (activePlyr) {
                activePlyr.destroy();
                activePlyr = null;
            }

            const item = lightboxItems[lightboxIndex];
            if (!item) return;

            stage.innerHTML = '';

            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.src;
                video.poster = item.poster || '';
                video.controls = true;
                video.playsInline = true;
                video.autoplay = true;
                stage.appendChild(video);

                const isPhone = window.matchMedia('(max-width: 767px) and (pointer: coarse)').matches;

                activePlyr = new Plyr(video, {
                    autoplay: true,
                    clickToPlay: false,
                    controls: isPhone
                        ? ['play-large', 'progress', 'current-time', 'mute', 'fullscreen']
                        : ['play-large', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
                });

                const togglePlayback = () => {
                    if (!activePlyr) return;
                    if (activePlyr.playing) {
                        activePlyr.pause();
                    } else {
                        activePlyr.play();
                    }
                };

                const bindPlyrTapToggle = () => {
                    const plyrRoot = stage.querySelector('.plyr');
                    const videoArea = stage.querySelector('.plyr__video-wrapper') || plyrRoot;
                    if (!videoArea) return;

                    const onTapToggle = (event) => {
                        if (event.target.closest('.plyr__controls, button, input, a')) return;
                        if (Math.abs(touchDeltaX) > 12 || Math.abs(touchDeltaY) > 12) return;

                        const tapDuration = Date.now() - touchStartTime;
                        if (event.type === 'touchend' && tapDuration > 280) return;

                        event.preventDefault();
                        event.stopPropagation();
                        togglePlayback();
                    };

                    videoArea.addEventListener('click', onTapToggle);
                    videoArea.addEventListener('touchend', onTapToggle, { passive: false });
                };

                requestAnimationFrame(bindPlyrTapToggle);
            } else {
                const img = document.createElement('img');
                img.src = item.src;
                img.alt = item.alt || '';
                img.className = 'max-h-full max-w-full rounded-2xl object-contain';
                stage.appendChild(img);
            }

            caption.textContent = item.alt || '';
            counter.textContent = `${lightboxIndex + 1} / ${lightboxItems.length}`;
            thumbs.innerHTML = '';

            lightboxItems.forEach((thumb, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'shrink-0 overflow-hidden rounded-2xl border transition ' + (index === lightboxIndex ? 'border-white/70' : 'border-white/10 opacity-70');
                button.innerHTML = thumb.type === 'video'
                    ? `<div class="relative h-16 w-24 bg-white/5"><img src="${thumb.poster || ''}" alt="${thumb.alt || t('galleryItem')}" class="h-full w-full object-cover" /><span class="absolute inset-0 flex items-center justify-center text-white">▶</span></div>`
                    : `<img src="${thumb.src}" alt="${thumb.alt || t('galleryItem')}" class="h-16 w-24 object-cover" />`;
                button.addEventListener('click', () => {
                    lightboxIndex = index;
                    renderLightbox();
                });
                thumbs.appendChild(button);
            });
        }

        function openLightbox(items, startIndex) {
            lightboxItems = items;
            lightboxIndex = startIndex || 0;
            renderLightbox();
            lightbox.classList.add('is-open');
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            // Очищаем плеер при закрытии
            if (activePlyr) {
                activePlyr.destroy();
                activePlyr = null;
            }

            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            stage.innerHTML = '';
            thumbs.innerHTML = '';
            document.body.style.overflow = '';
        }

        function stepLightbox(delta) {
            if (!lightboxItems.length) return;
            lightboxIndex = (lightboxIndex + delta + lightboxItems.length) % lightboxItems.length;
            renderLightbox();
        }

        closeBtn.addEventListener('click', closeLightbox);
        lightboxBackdrop.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', () => stepLightbox(-1));
        nextBtn.addEventListener('click', () => stepLightbox(1));
        stage.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].clientX;
            touchStartY = event.changedTouches[0].clientY;
            touchDeltaX = 0;
            touchDeltaY = 0;
            touchStartTime = Date.now();
        }, { passive: true });
        stage.addEventListener('touchmove', (event) => {
            touchDeltaX = event.changedTouches[0].clientX - touchStartX;
            touchDeltaY = event.changedTouches[0].clientY - touchStartY;
        }, { passive: true });
        stage.addEventListener('touchend', () => {
            if (Math.abs(touchDeltaX) > 45 && Math.abs(touchDeltaY) < 30) {
                stepLightbox(touchDeltaX > 0 ? -1 : 1);
            }
        }, { passive: true });

        document.addEventListener('click', (event) => {
            if (!openCardId) return;
            const insideCard = event.target.closest('article');
            if (!insideCard) closeDescriptions();
        });

        document.addEventListener('keydown', (event) => {
            if (lightbox.classList.contains('is-open')) {
                if (event.key === 'Escape') closeLightbox();
                if (event.key === 'ArrowLeft') stepLightbox(-1);
                if (event.key === 'ArrowRight') stepLightbox(1);
                return;
            }
            if (event.key === 'Escape' && openCardId) closeDescriptions();
        });

        langButtons.forEach((btn) => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
        tabButtons.forEach((btn) => btn.addEventListener('click', () => setTab(btn.dataset.tab)));

        updateLangUI();
        setTab('rent');
    });
</script>
</body>
</html>
